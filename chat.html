<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat - InstaCar</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>InstaCar Chat</h1>
    </header>

    <main class="chat-main-container">
        <div id="header-annuncio-chat" class="mini-annuncio-header">
            <button onclick="window.history.back()" class="btn-normale" style="width: auto; height: 40px; padding: 0 15px;">← Indietro</button>
            <div id="dettagli-mini-annuncio" style="display: flex; align-items: center; gap: 15px; margin-left: 15px;">
                </div>
        </div>

        <div id="chat-box"></div>

        <form id="form-messaggio">
            <input type="text" id="testo-msg" placeholder="Scrivi un messaggio..." required autocomplete="off" class="search-bar" style="width: 100%; margin: 0;">
            <button type="submit" class="btn-pubblica" style="padding: 10px 20px;">Invia</button>
        </form>
    </main>

    <script type="module" src="chat.js"></script>
</body>
</html>
