<!DOCTYPE html>
<html lang="it">

<head>
    <meta charset="UTF-8">
    <title>Dettagli - InstaCar</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <header>
        <h1 id="dettaglio-titolo">...</h1>
    </header>
    <main style="display:flex; flex-direction:column; align-items:center; padding:20px;">
        <div id="info-auto" style="max-width: 800px; text-align: center;">
        </div>
        <nav><a href="annunci.html" class="btn-normale">Torna agli annunci</a></nav>
    </main>
    <script src="script.js"></script>
    <script>
        const params = new URLSearchParams(window.location.search);
        const id = params.get('id');
        const auto = catalogo[id];

        if (auto) {
            document.getElementById('dettaglio-titolo').innerText = auto.marca + " " + auto.modello;
            document.getElementById('info-auto').innerHTML = `
                <img src="${auto.immagine}" style="width:100%; border-radius:20px; border:2px solid cyan;">
                <div style="text-align:left; margin-top:20px; font-size:1.2em;">
                    <p><strong>Costo:</strong> ${auto.prezzo} €</p>
                    <p><strong>Carburante:</strong> ${auto.carburante}</p>
                    <p><strong>Proprietari precedenti:</strong> ${auto.proprietari}</p>
                    <p><strong>Descrizione:</strong> ${auto.descrizione}</p>
                    <button onclick="compraAuto(${id})" class="btn-compra">COMPRA ORA</button>
                </div>
            `;
        }
    </script>
</body>

</html>
