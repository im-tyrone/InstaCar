<!DOCTYPE html>
<html lang="it">

<head>
    <meta charset="UTF-8">
    <title>Mini Progetto Separato</title>
    <link rel="stylesheet" href="stile.css">

</head>

<body>
    <h1>AutoScout24</h1><br>
    <form action="/salva-auto" method="POST">
        <h2>Inserisci la tua auto</h2>

        <label for="marca">Marca:</label>
        <input type="text" id="marca" name="marca" placeholder="Es. Fiat" required>
        <br><br>

        <label for="prezzo">Prezzo (&euro;):</label>
        <input type="number" id="prezzo" name="prezzo" required>
        <br><br>

        <input type="submit" value="Pubblica Inserzione">
    </form><br>
    <h2 class="top">Titolo in evidenza</h2>
    <h2 class="bottom">Note a piè di pagina</h2><br>
    <p id="mioelem">Questo paragrafo sarà in grassetto.</p>
    <p>Questo invece sarà normale.</p>
    <div class="auto-card">
        <h2>Fiat 500 Usata</h2>
        <p>Prezzo: &euro; 10.500</p>
    </div>
</body>

</html>
