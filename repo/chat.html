<!DOCTYPE html>
<html lang="it">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat - InstaCar</title>
    <link rel="stylesheet" href="style.css">

    <style>
        /* Qui mettiamo solo i pezzi specifici della chat che non hai nel CSS generale */
        
        #chat-box {
            height: 60vh;
            overflow-y: auto;
            padding: 15px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            border: 1px solid rgba(0, 255, 255, 0.2);
            border-radius: 8px;
            margin-bottom: 15px;
            background-color: #050505;
        }
        
        .msg {
            max-width: 75%;
            padding: 10px 15px;
            border-radius: 12px;
            word-wrap: break-word;
        }
        
        .msg-mio {
            background-color: cyan;
            color: black;
            align-self: flex-end;
            border-bottom-right-radius: 2px;
        }
        
        .msg-altro {
            background-color: #333;
            color: white;
            align-self: flex-start;
            border-bottom-left-radius: 2px;
        }
    </style>
</head>

<body>

    <div class="chat-container card-auto" style="max-width: 600px; margin: 20px auto; width: 90%;">
        <div id="header-annuncio-chat" class="mini-annuncio-header">
        </div>
        <h2 style="color: cyan;">Chat Privata</h2>

        <div id="chat-box">
        </div>

        <form id="form-messaggio" style="display: flex; gap: 10px;">
            <input type="text" id="testo-msg" class="search-bar" style="flex: 1; margin: 0;" placeholder="Scrivi un messaggio..." required>
            <button type="submit" class="btn-pubblica" style="padding: 10px 20px;">Invia</button>
        </form>
    </div>
    <nav><a href="auto.html" class="btn-pubblica">Torna alle specifiche</a></nav>
    <script type="module" src="chat.js"></script>
</body>

</html>
