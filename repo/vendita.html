<!DOCTYPE html>
<html lang="it">

<head>
    <meta charset="UTF-8">
    <title>Vendi Auto - InstaCar</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .form-vendita {
            max-width: 500px;
            margin: 40px auto;
            padding: 20px;
            border: 1px solid cyan;
            border-radius: 15px;
            background: #111;
        }
        
        .input-box {
            width: 90%;
            padding: 10px;
            margin: 10px 0;
            background: black;
            border: 1px solid cyan;
            color: white;
            border-radius: 5px;
        }
    </style>
</head>

<body>
    <header>
        <h1>Vendi la tua Auto</h1>
    </header>

    <main>
        <form class="form-vendita" id="car-form">
            <input type="text" id="marca" placeholder="Marca (es. Audi)" class="input-box" required>
            <input type="text" id="modello" placeholder="Modello (es. A3)" class="input-box" required>
            <input type="text" id="prezzo" placeholder="Prezzo" class="input-box" required>
            <input type="text" id="km" placeholder="Chilometri" class="input-box" required>
            <input type="number" id="anno" placeholder="Anno" class="input-box" required>
            <input type="email" id="contatto" placeholder="Tua Email o Telefono" class="input-box" required>
            <textarea id="descrizione" placeholder="Descrizione dell'auto..." class="input-box" rows="4"></textarea>

            <label style="color: cyan;">Carica Foto (Multiple):</label>
            <input type="file" id="foto" accept="image/*" multiple class="input-box">
            <div id="preview-area" class="gallery-container"></div>

            <button type="submit" class="btn-pubblica" style="width: 100%; margin-top: 20px;">Pubblica Annuncio</button>
        </form>
        <button onclick="window.location.href='index.html'" class="btn-normale" style="margin-bottom: 20px; background-color: #555;">
            Torna alla Home
        </button>
    </main>


    <script type="module" src="vendita.js"></script>
</body>

</body>

</html>
