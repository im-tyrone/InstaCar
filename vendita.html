<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>Vendi Auto - InstaCar</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .form-vendita { max-width: 500px; margin: 40px auto; padding: 20px; border: 1px solid cyan; border-radius: 15px; background: #111; }
        .input-box { width: 90%; padding: 10px; margin: 10px 0; background: black; border: 1px solid cyan; color: white; border-radius: 5px; }
    </style>
</head>
<body>
    <header><h1>Vendi la tua Auto</h1></header>

    <main>
        <form class="form-vendita" id="car-form">
            <input type="text" id="marca" placeholder="Marca (es. Audi)" class="input-box" required>
            <input type="text" id="modello" placeholder="Modello (es. A3)" class="input-box" required>
            <input type="text" id="prezzo" placeholder="Prezzo" class="input-box" required>
            <input type="text" id="km" placeholder="Chilometri" class="input-box" required>
            <input type="number" id="anno" placeholder="Anno" class="input-box" required>
            <input type="email" id="contatto" placeholder="Tua Email o Telefono" class="input-box" required>
            <textarea id="descrizione" placeholder="Descrizione dell'auto..." class="input-box" rows="4"></textarea>
            
            <label style="color: cyan;">Carica Foto (Multiple):</label>
            <input type="file" id="foto" accept="image/*" multiple class="input-box">
            <div id="preview-area" class="gallery-container"></div>

            <button type="submit" class="btn-pubblica" style="width: 100%; margin-top: 20px;">Pubblica Annuncio</button>
        </form>
        <button onclick="window.location.href='index.html'" class="btn-normale" style="margin-bottom: 20px; background-color: #555;">
            Torna alla Home
        </button>
    </main>

    
<script type="module">
    import { auth, db } from './firebase-config.js';
    import { collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";
    import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";

    let utenteAttivo = null;
    let arrayImmagini = [];

    // 1. Controlliamo se l'utente è loggato appena entra nella pagina
    onAuthStateChanged(auth, (user) => {
        if (user) {
            utenteAttivo = user;
            console.log("Utente pronto per pubblicare:", user.email);
        } else {
            alert("Attenzione: devi essere loggato per pubblicare. Verrai reindirizzato al login.");
            window.location.href = 'index.html';
        }
    });

    // Gestione Invio Modulo
    document.getElementById('car-form').addEventListener('submit', async (e) => {
        e.preventDefault();

        if (!utenteAttivo) {
            alert("Errore: Utente non identificato. Prova a rifare il login.");
            return;
        }

        const datiAuto = {
            id_venditore: utenteAttivo.uid,
            email_venditore: utenteAttivo.email,
            marca: document.getElementById('marca').value,
            modello: document.getElementById('modello').value,
            prezzo: document.getElementById('prezzo').value,
            km: document.getElementById('km').value,
            anno: document.getElementById('anno').value,
            descrizione: document.getElementById('descrizione').value,
            immagini: arrayImmagini, 
            creatoIl: serverTimestamp() // Aggiunge data e ora precise del server
        };

        console.log("Tentativo di invio dati:", datiAuto);

        try {
            // "annunci" è il nome della collezione su Firestore
            const docRef = await addDoc(collection(db, "annunci"), datiAuto);
            console.log("Successo! ID Documento:", docRef.id);
            alert("Annuncio pubblicato con successo!");
            window.location.href = 'annunci.html';
        } catch (error) {
            console.error("Errore durante la pubblicazione:", error);
            alert("Errore Firestore: " + error.message);
        }
    });

    document.getElementById('foto').addEventListener('change', function(e) {
        const previewArea = document.getElementById('preview-area');
        previewArea.innerHTML = ''; // Pulisce vecchie anteprime se l'utente cambia idea
        arrayImmagini = []; // Resetta l'array

        const files = e.target.files;
        for (let file of files) {
            const reader = new FileReader();
            reader.onload = (event) => {
                const imgData = event.target.result;
                arrayImmagini.push(imgData); // Salva in Base64
                
                // Crea l'elemento visuale
                const imgThumb = document.createElement('img');
                imgThumb.src = imgData;
                imgThumb.classList.add('gallery-img');
                previewArea.appendChild(imgThumb);
            };
            reader.readAsDataURL(file);
        }
    });
</script>

</body>
</html>
